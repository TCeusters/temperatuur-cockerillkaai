name: Temperatuurgrafiek bijwerken

# Wanneer draait dit?
on:
  schedule:
    - cron: "5 * * * *"       # elk uur (rond :05 na het uur, UTC)
  workflow_dispatch: {}         # + handmatig te starten via de knop "Run workflow"

# Rechten die de workflow nodig heeft om naar GitHub Pages te publiceren
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Repo ophalen
        uses: actions/checkout@v4

      - name: Grafiek + CSV genereren
        env:
          NETATMO_CLIENT_ID: ${{ secrets.NETATMO_CLIENT_ID }}
          NETATMO_CLIENT_SECRET: ${{ secrets.NETATMO_CLIENT_SECRET }}
          NETATMO_REFRESH_TOKEN: ${{ secrets.NETATMO_REFRESH_TOKEN }}
          HOURLY_DAYS: "42"
          LAT: "51.212"
          LON: "4.399"
        run: python3 scripts/build.py

      # Netatmo geeft soms een NIEUW refresh-token terug. Dat bewaren we hier
      # als secret, zodat de taak morgen weer werkt. Draait ook als de stap
      # hierboven faalde (if: always), zolang er een nieuw token bewaard werd.
      - name: Nieuw refresh-token bewaren
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f new_refresh_token.txt ]; then
            gh secret set NETATMO_REFRESH_TOKEN \
              --body "$(cat new_refresh_token.txt)" \
              --repo "$GITHUB_REPOSITORY"
            echo "Nieuw Netatmo refresh-token opgeslagen als secret."
            rm -f new_refresh_token.txt
          else
            echo "Geen nieuw refresh-token; niets te doen."
          fi

      - name: Pages-artefact uploaden
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Publiceren naar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
